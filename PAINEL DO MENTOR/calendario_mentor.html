   <script>
  const lista = document.getElementById('listaAgendamentos');
  const chave = 'mentor_sessoes'; // 🔹 Chave certa para sessões do mentor

  function renderizarAgendamentos() {
    const agendamentos = JSON.parse(localStorage.getItem(chave) || '[]');
    lista.innerHTML = '';
    if (agendamentos.length === 0) {
      lista.innerHTML = '<p>Nenhuma sessão agendada até o momento.</p>';
      return;
    }
    agendamentos.forEach((ag) => {
      const item = document.createElement('div');
      item.className = 'agendamento-item';
      item.innerHTML = `<strong>${ag.data} às ${ag.hora}</strong><br>${ag.descricao}`;
      lista.appendChild(item);
    });
  }

  document.addEventListener('DOMContentLoaded', renderizarAgendamentos);
</script>
