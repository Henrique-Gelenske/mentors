<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calendário de Reuniões - Mentors</title>
  <link rel="stylesheet" href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/style.css">
  <style>
    .agendamentos {
      background: #e6f2ff;
      padding: 1rem;
      border-radius: 10px;
      margin-top: 1rem;
    }
    .agendamento-item {
      background: #fff;
      margin-bottom: 0.8rem;
      padding: 0.6rem;
      border-radius: 6px;
      border-left: 5px solid #0073e6;
    }
    .botao-voltar {
      display: inline-block;
      margin-bottom: 1rem;
      background: #003366;
      color: #fff;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="logo">Mentors</div>
    <nav>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/index.html">Início</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/index.html#quem-somos">Quem somos</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/index.html#beneficios">Benefícios</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/index.html#porque-usar">Por que usar a mentoria</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/mentores.html">Mentores</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/login.html">Logout</a>
    </nav>
  </header>

  <main class="dashboard">
    <h1>Calendário de Reuniões</h1>
    <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/painel_aluno.html" class="botao-voltar">← Voltar ao Painel</a>

    <section class="agendamentos">
      <h2>Sessões Agendadas</h2>
      <div id="listaAgendamentos"></div>
    </section>
    
  </main>

  <script>
    const lista = document.getElementById('listaAgendamentos');
    const chave = 'mentorias';

    function renderizarAgendamentos() {
      const agendamentos = JSON.parse(localStorage.getItem(chave) || '[]');
      lista.innerHTML = '';
      if (agendamentos.length === 0) {
        lista.innerHTML = '<p>Nenhuma sessão agendada até o momento.</p>';
        return;
      }
      agendamentos.forEach((ag) => {
        const item = document.createElement('div');
        item.className = 'agendamento-item';
        item.innerHTML = `<strong>${ag.data} às ${ag.hora}</strong><br>${ag.descricao}`;
        lista.appendChild(item);
      });
    }

    document.addEventListener('DOMContentLoaded', renderizarAgendamentos);
  </script>
</body>
</html>
