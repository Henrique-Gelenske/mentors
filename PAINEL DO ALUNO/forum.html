<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fórum de Discussões - Mentors</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f9ff;
      margin: 0;
      padding: 0;
    }
    .topbar {
      background-color: #003366;
      color: white;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .topbar nav a {
      color: white;
      margin-left: 1rem;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    h1 {
      text-align: center;
      color: #003366;
    }
    .mensagem {
      border-left: 5px solid #0073e6;
      padding: 1rem;
      margin-bottom: 1rem;
      background: #f9f9f9;
      border-radius: 6px;
    }
    .mensagem strong {
      color: #003366;
    }
    form {
      margin-top: 2rem;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: #0073e6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .botao-voltar {
      display: inline-block;
      margin-top: 1rem;
      background: #003366;
      color: #fff;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: #003366;
      color: white;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="logo">Mentors</div>
    <nav>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/index.html">Início</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/index.html#quem-somos">Quem somos</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/index.html#beneficios">Benefícios</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/index.html#porque-usar">Por que usar a mentoria</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/mentores.html">Mentores</a>
      <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/login.html">Logout</a>
    </nav>
  </header>

  <main class="dashboard">
    <h1>Fórum de Discussões</h1>
    <a href="/Users/Desktop/OneDrive/Área de Trabalho/Site Mentoria/painel_aluno.html" class="botao-voltar">← Voltar ao Painel</a>
    
   <div id="mensagens"></div>

    <form id="form-forum">
      <label for="autor">Seu nome:</label>
      <input type="text" id="autor" required>

      <label for="conteudo">Mensagem:</label>
      <textarea id="conteudo" rows="4" required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </main>

 <footer>
    <p>&copy; 2025 Mentors - Todos os direitos reservados.</p>
  </footer>

  <script>
    const form = document.getElementById('form-forum');
    const mensagensDiv = document.getElementById('mensagens');
    const chave = 'forum_mensagens';

    function carregarMensagens() {
      const mensagens = JSON.parse(localStorage.getItem(chave) || '[]');
      mensagensDiv.innerHTML = '';
      mensagens.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'mensagem';
        div.innerHTML = '<strong>' + msg.autor + ':</strong><br>' + msg.conteudo;
        mensagensDiv.appendChild(div);
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const novaMensagem = {
        autor: document.getElementById('autor').value,
        conteudo: document.getElementById('conteudo').value
      };
      const mensagens = JSON.parse(localStorage.getItem(chave) || '[]');
      mensagens.push(novaMensagem);
      localStorage.setItem(chave, JSON.stringify(mensagens));
      form.reset();
      carregarMensagens();
    });

    document.addEventListener('DOMContentLoaded', carregarMensagens);
  </script>
</body>
</html>
